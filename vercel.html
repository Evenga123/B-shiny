<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>B SHINY Vercel deploy</title>
  <meta name="description" content="Tiesiogine B SHINY demo deploy nuoroda i Vercel.">
  <style>
    :root {
      --bg: #07090b;
      --panel: #101418;
      --text: #f6f2ea;
      --muted: #b9b2a8;
      --accent: #d6b25e;
      --line: rgba(255, 255, 255, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at 75% 20%, rgba(99, 192, 180, 0.16), transparent 34%), var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    main {
      width: min(680px, 100%);
      padding: clamp(28px, 7vw, 56px);
      background: rgba(16, 20, 24, 0.88);
      border: 1px solid var(--line);
    }

    p:first-child {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(34px, 8vw, 64px);
      line-height: 1;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      margin-top: 18px;
      padding: 0 24px;
      background: var(--accent);
      color: #15110a;
      font-weight: 800;
      text-decoration: none;
    }

    small {
      display: block;
      margin-top: 18px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <p>Vercel deploy</p>
    <h1>B SHINY demo</h1>
    <p>Spausk mygtuką ir Vercel atidarys šio projekto importą. Prisijunk prie savo Vercel paskyros, pasirink workspace ir spausk Deploy.</p>
    <a href="https://vercel.com/new/clone?repository-url=https%3A%2F%2Fgithub.com%2FEvenga123%2FB-shiny&project-name=b-shiny&repository-name=b-shiny">Atidaryti Vercel deploy</a>
    <small>Repo: Evenga123/B-shiny</small>
  </main>
</body>
</html>
